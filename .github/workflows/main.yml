name: DemoqaAutomation

on:
  push:
  pull_request:

jobs:
  Automation:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create virtual environment
        run: python -m venv venv

      - name: Activate virtual environment
        run: venv\Scripts\activate

      - name: Install dependencies
        run: |
          venv\Scripts\pip install --upgrade pip
          venv\Scripts\pip install pytest pytest-html pytest-check selenium selenium-wire webdriver-manager openpyxl

      - name: Run tests and generate report
        run: |
          venv\Scripts\pytest DEMOQA/TestCases/ --html=report.html --self-contained-html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: report.html
